<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./fontAwesome/webfonts/all.min.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <title>MusicTop</title>
</head>

<body>
    <div class="barra-cerrar">
        <div class="container-button-main">
            <h3 id="minimizar" class="minimizar">-</h3>
        </div>
        <div class="container-button-main">
            <h3 id="cerrar" class="cerrar">x</h3>
        </div>
    </div>
    <div class="reproductor">
        <main class="titlebar">
            <div class="datos">
                <div class="titulos">
                    <h2 id="title"></h2>
                    <p id="artist"></p>
                </div>
                <div class="progreso">
                    <input class="barra-progreso" id="progress" type="range" value="0" min="0" max="100" step="0.1" />
                    <p class="tiempo-progreso" id="tiempo-progreso">00:00 / 00:00</p>
                </div>
            </div>
            <div class="caratula">
                <img id="cover" src="" alt="cover">
            </div>
            <div class="navegador">
                <div class="volumen">
                    <div class="vol-text" >
                        <p>Volumen: </p>
                        <p id="volumen-texto"><span class="volumen-cantidad"> 100</span></p>
                    </div>
                    <input id="volumen-control" class="volumen-control" type="range" value="1" min="0" max="1"
                        step="0.01">
                </div>
                <div class="control-principal">
                    <audio id="player"></audio>
                    <button id="stopBtn"><i class="fa-solid fa-circle-stop buttons"></i></button>
                    <button id="playBtn"><i class="fa-solid fa-circle-play play"></i></button>
                    <button><i class="fa-solid fa-circle-arrow-right buttons"></i></button>
                </div>
                <div class="control-secundario">
                </div>
            </div>
            <div class="miselanios">
                <button id="idFolderBtn" class="isFolderBtn"> Elije carpeta</button>
                <div>
                    <p>Lista de reproduccion</p>
                    <div>
                        <ol id="listaReproduccion" ></ol>
                    </div>
                </div>
            </div>
        </main>
    </div>


    <script type="module" src="./renderer.js"></script>
</body>

</html>
